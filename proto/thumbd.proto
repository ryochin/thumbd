syntax = "proto3";

package thumbd.v1;

service ImageConverter {
  // Convert an image to a thumbnail.
  rpc Convert(ConvertRequest) returns (ConvertResponse);
}

enum ImageType {
  IMAGE_TYPE_UNSPECIFIED = 0;
  IMAGE_TYPE_WEBP        = 1;
}

message ConvertRequest {
  bytes     image_data  = 1;
  ImageType image_type  = 2;
  uint32    max_width   = 3;
  uint32    max_height  = 4;
  optional uint32 quality = 5;
  optional uint32 effort  = 6;
}

message ConvertResponse {
  bytes  output_data = 1;
  uint32 width       = 2;
  uint32 height      = 3;
  uint32 work_ms     = 4;
}
